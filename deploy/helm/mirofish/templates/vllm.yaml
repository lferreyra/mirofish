{{- if .Values.vllm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mirofish.fullname" . }}-vllm
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mirofish.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vllm
  template:
    metadata:
      labels:
        {{- include "mirofish.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vllm
    spec:
      containers:
        - name: vllm
          image: "{{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}"
          args:
            - "--model={{ .Values.vllm.model }}"
            - "--enable-prefix-caching"
            {{- if .Values.vllm.speculativeModel }}
            - "--speculative-model={{ .Values.vllm.speculativeModel }}"
            - "--num-speculative-tokens={{ .Values.vllm.speculativeTokens }}"
            {{- end }}
          ports:
            - name: http
              containerPort: 8000
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mirofish.fullname" . }}-vllm
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      name: http
  selector:
    {{- include "mirofish.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
{{- end }}
