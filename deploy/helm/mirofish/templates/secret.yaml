{{- /*
Placeholder Secret. In prod, use external-secrets / sealed-secrets /
sops-secrets-operator to populate the real values. We ship an empty Secret
here so `helm install` succeeds out of the box against a dry-run cluster.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.secretName }}
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
    # Operators: populate this Secret out-of-band. Never commit real creds.
    mirofish.io/warning: "populate externally before first simulation run"
type: Opaque
stringData:
  ADMIN_TOKEN: ""
  LLM_API_KEY: ""
  ZEP_API_KEY: ""
  neo4j-password: ""
