services:
  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./frontend/src:/app/frontend/src
      - ./frontend/index.html:/app/frontend/index.html
