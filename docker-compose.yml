services:
  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # Accelerated mirror (replace above if pulling is slow)
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5.26-community
    container_name: mirofish-neo4j
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: neo4j/mirofish123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: cypher-shell -u neo4j -p mirofish123 "RETURN 1"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  neo4j_data:
