services:
  - type: web
    name: mirofish
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL_NAME
        sync: false
      - key: ZEP_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
